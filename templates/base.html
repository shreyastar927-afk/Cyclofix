<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycloFix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#e91e8c">
</head>
<body>
    <div class="container">
        <header>
            <h1>CycloFix 🌸</h1>
            <p>Welcome back, {{ user.name }}</p>
            <a href="/logout">Logout</a>
        </header>
        
        <main>
    <div class="cycle-status">
        <div class="cycle-day-display">
            Day {{ current_day }} of your cycle
        </div>
        {% if current_day > user.cycle_length %}
        <div class="cycle-alert">
            Your period may be due — did it start?
        </div>
        {% endif %}
    </div>
    <div class="insight-card" style="margin-bottom:1rem">
    <div class="insight-emoji">{{ insight.emoji }}</div>
    <div class="insight-text">
        <div style="font-size:11px;color:#e91e8c;font-weight:600;margin-bottom:3px">YOUR WEEKLY INSIGHT</div>
        {{ insight.text }}
    </div>
</div>

    <button onclick="periodStarted()" 
            style="background:white;color:#e91e8c;border:1.5px solid #e91e8c;margin-bottom:8px">
        🩸 My period started today
    </button>
    <a href="/log"><button>Log Pain 🌸</button></a>
    <a href="/patterns"><button style="background:white;color:#e91e8c;border:1.5px solid #e91e8c;margin-top:8px">
        View My Patterns 📊
    </button></a>
    <button id="installBtn" onclick="installApp()" 
        style="display:none;background:white;color:#e91e8c;border:1.5px solid #e91e8c;margin-top:8px;font-size:13px">
    📲 Install CycloFix App
</button>
</main>

<script>
function periodStarted() {
    if (confirm('Mark today as the start of your new cycle?')) {
        fetch('/period_started', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'}
        }).then(r => { if(r.redirected) window.location.href = r.url; });
    }
}
</script>
    </div>
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'block';
});

window.addEventListener('appinstalled', () => {
    document.getElementById('installBtn').style.display = 'none';
});

function installApp() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((result) => {
            deferredPrompt = null;
        });
    }
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('CycloFix SW registered'))
        .catch(err => console.log('SW error:', err));
}
</script>
</body>
</html>
