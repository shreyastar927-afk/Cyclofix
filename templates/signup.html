<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycloFix — Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>CycloFix 🌸</h1>
        <h2>Create Account</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="error">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <div class="form-group">
            <input type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <div class="form-group">
            <label>When did your last period start?</label>
            <input type="date" name="last_period_start" required>
        </div>
        <button onclick="submitSignup()">Create Account</button>
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>
    <script>
    function submitSignup() {
        const name = document.querySelector('input[name="name"]').value;
        const email = document.querySelector('input[name="email"]').value;
        const password = document.querySelector('input[name="password"]').value;
        const last_period_start = document.querySelector('input[name="last_period_start"]').value;
        fetch('/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&last_period_start=${encodeURIComponent(last_period_start)}`
        }).then(r => { if(r.redirected) window.location.href = r.url; });
    }
    </script>
</body>
</html>
